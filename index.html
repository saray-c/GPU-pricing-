<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>⚡ GPU Cloud Pricing</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; }
  body { margin: 0; padding: 0; background: #f3f4f6; font-family: system-ui, -apple-system, sans-serif; }
  input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; }
  input[type=number] { -moz-appearance: textfield; }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect } = React;

const CURRENT = [
  { vendor: "Hydrahost",          h100: 2.30,  a100: 1.19,  h200: null,   avail: "limited",    availNote: "Smaller provider; capacity can be tight" },
  { vendor: "Runpod",             h100: 2.69,  a100: 1.49,  h200: 3.59,   avail: "high",       availNote: "Large community marketplace; instant spin-up" },
  { vendor: "Lambda Labs",        h100: 2.99,  a100: 1.48,  h200: null,   avail: "medium",     availNote: "On-demand only; H100/A100 inventory strong, can sell out" },
  { vendor: "CoreWeave",          h100: 6.16,  a100: 2.70,  h200: 6.16,   avail: "enterprise", availNote: "Requires enterprise onboarding; 3–6 month commitment for reserved" },
  { vendor: "AWS",                h100: 3.90,  a100: 3.40,  h200: 3.20,   avail: "high",       availNote: "Global availability; Capacity Blocks for guaranteed access" },
  { vendor: "Oracle (OCI)",       h100: 10.00, a100: 4.00,  h200: 10.00,  avail: "medium",     availNote: "Bare-metal only; 8-GPU minimum per instance" },
  { vendor: "Google Cloud (GCP)", h100: 3.00,  a100: 5.07,  h200: 3.72,   avail: "high",       availNote: "Global availability; A3/A3-mega instances" },
  { vendor: "Nebius",             h100: 2.95,  a100: null,   h200: 3.50,   avail: "medium",     availNote: "European data centers (GDPR); InfiniBand support" },
];

const GPU_TYPES = [{ key: "h100", label: "H100" }, { key: "a100", label: "A100" }, { key: "h200", label: "H200" }];
const tierStyle = { h100: { background: "#ede9fe", color: "#7c3aed" }, a100: { background: "#dbeafe", color: "#1d4ed8" }, h200: { background: "#fef3c7", color: "#b45309" } };
const availConfig = {
  high:       { label: "High",       bg: "#dcfce7", color: "#166534", dot: "#16a34a" },
  medium:     { label: "Medium",     bg: "#fef9c3", color: "#854d0e", dot: "#ca8a04" },
  limited:    { label: "Limited",    bg: "#fee2e2", color: "#991b1b", dot: "#dc2626" },
  enterprise: { label: "Enterprise", bg: "#e0e7ff", color: "#3730a3", dot: "#4f46e5" },
};
const VENDOR_COLORS = ["#7c3aed","#2563eb","#059669","#d97706","#dc2626","#0891b2","#be185d","#4f46e5"];
const STORAGE_KEY = "gpu-pricing-snapshots";

const fmt = n => n.toLocaleString("en-US", { minimumFractionDigits: 2, maximumFractionDigits: 2 });
const getWeekStart = () => { const d = new Date(); d.setDate(d.getDate() - d.getDay()); return d.toISOString().slice(0, 10); };
const weekLabel = d => new Date(d + "T12:00:00").toLocaleDateString("en-US", { month: "short", day: "numeric", year: "numeric" });

function App() {
  const [tab, setTab] = useState("pricing");
  const [gpus, setGpus] = useState(8);
  const [hours, setHours] = useState(24);
  const [selectedGpu, setSelectedGpu] = useState("h100");
  const [tooltip, setTooltip] = useState(null);
  const [snapshots, setSnapshots] = useState([]);
  const [editSnap, setEditSnap] = useState(null);
  const [editData, setEditData] = useState({});
  const [snapLabel, setSnapLabel] = useState("");
  const [historyGpu, setHistoryGpu] = useState("h100");
  const [autoSavedDate, setAutoSavedDate] = useState(null);

  useEffect(() => {
    let existing = [];
    try { existing = JSON.parse(localStorage.getItem(STORAGE_KEY) || "[]"); } catch (_) {}
    const weekStart = getWeekStart();
    if (!existing.some(s => s.date === weekStart)) {
      const data = {};
      CURRENT.forEach(v => { data[v.vendor] = { h100: v.h100, a100: v.a100, h200: v.h200 }; });
      const snap = { id: Date.now(), label: `Week of ${weekLabel(weekStart)}`, date: weekStart, prices: data, auto: true };
      existing = [...existing, snap].sort((a, b) => a.date.localeCompare(b.date));
      localStorage.setItem(STORAGE_KEY, JSON.stringify(existing));
      setAutoSavedDate(weekStart);
    }
    setSnapshots(existing);
  }, []);

  const persist = snaps => { setSnapshots(snaps); localStorage.setItem(STORAGE_KEY, JSON.stringify(snaps)); };

  const startSnapshot = () => {
    const data = {};
    CURRENT.forEach(v => { data[v.vendor] = { h100: v.h100, a100: v.a100, h200: v.h200 }; });
    setEditData(data); setSnapLabel(`Week of ${weekLabel(getWeekStart())}`); setEditSnap("new");
  };

  const saveSnapshot = () => {
    const snap = { id: Date.now(), label: snapLabel || `Week of ${weekLabel(getWeekStart())}`, date: getWeekStart(), prices: editData };
    persist([...snapshots, snap].sort((a, b) => a.date.localeCompare(b.date)));
    setEditSnap(null);
  };

  const rows = CURRENT
    .map(v => ({ vendor: v.vendor, pricePerHr: v[selectedGpu], avail: v.avail, availNote: v.availNote }))
    .filter(v => v.pricePerHr !== null)
    .map(v => ({ ...v, total: v.pricePerHr * gpus * hours }))
    .sort((a, b) => a.total - b.total);

  const cheapest = rows[0], priciest = rows[rows.length - 1];
  const savings = rows.length > 1 ? priciest.total - cheapest.total : 0;
  const allVendors = CURRENT.map(v => v.vendor);

  const s = { /* inline styles shorthand */
    wrap: { maxWidth: 960, margin: "0 auto", padding: "24px 16px" },
    card: { background: "white", border: "1px solid #e5e7eb", borderRadius: 12, padding: "12px 16px" },
    th: { padding: "12px 16px", fontSize: 11, fontWeight: 700, letterSpacing: "0.06em", color: "white" },
    td: { padding: "13px 16px", borderBottom: "1px solid #e5e7eb" },
    btn: (active, colors) => ({ padding: "9px 0", borderRadius: 8, border: "1.5px solid", fontWeight: 700, fontSize: 13, cursor: "pointer", flex: 1, ...(active ? colors : { background: "white", color: "#374151", borderColor: "#d1d5db" }) }),
    tabBtn: active => ({ padding: "8px 18px", borderRadius: 8, border: "1.5px solid", fontWeight: 700, fontSize: 13, cursor: "pointer", background: active ? "#7c3aed" : "white", color: active ? "white" : "#374151", borderColor: active ? "#7c3aed" : "#d1d5db" }),
    input: { padding: "9px 12px", borderRadius: 8, border: "1.5px solid #d1d5db", fontSize: 20, fontWeight: 800, color: "#111827", outline: "none", width: "100%", background: "white" },
    label: { display: "block", fontSize: 11, fontWeight: 700, color: "#6b7280", marginBottom: 6, textTransform: "uppercase", letterSpacing: "0.05em" },
  };

  return (
    <div style={s.wrap}>
      {/* Header */}
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-end", marginBottom: 20, flexWrap: "wrap", gap: 12 }}>
        <div>
          <h1 style={{ fontSize: 24, fontWeight: 800, margin: "0 0 4px" }}>⚡ GPU Cloud Pricing</h1>
          <p style={{ color: "#6b7280", margin: 0, fontSize: 13 }}>On-demand pricing, availability & weekly tracking — April 2026</p>
        </div>
        <div style={{ display: "flex", gap: 6 }}>
          <button style={s.tabBtn(tab === "pricing")} onClick={() => setTab("pricing")}>💰 Pricing</button>
          <button style={s.tabBtn(tab === "history")} onClick={() => setTab("history")}>📈 History</button>
        </div>
      </div>

      {/* PRICING TAB */}
      {tab === "pricing" && <>
        {autoSavedDate && (
          <div style={{ background: "#f0fdf4", border: "1px solid #86efac", borderRadius: 10, padding: "10px 16px", marginBottom: 16, fontSize: 13, color: "#166534", display: "flex", gap: 8, alignItems: "center" }}>
            <span>✅</span><span><strong>Auto-logged:</strong> Prices for week of <strong>{weekLabel(autoSavedDate)}</strong> saved automatically. Check <strong>📈 History</strong>.</span>
          </div>
        )}

        {/* Controls */}
        <div style={{ display: "flex", gap: 14, flexWrap: "wrap", background: "#f9fafb", border: "1px solid #e5e7eb", borderRadius: 12, padding: 18, marginBottom: 18 }}>
          <div style={{ flex: 1, minWidth: 160 }}>
            <label style={s.label}>GPU Type</label>
            <div style={{ display: "flex", gap: 6 }}>
              {GPU_TYPES.map(g => <button key={g.key} onClick={() => setSelectedGpu(g.key)} style={s.btn(selectedGpu === g.key, tierStyle[g.key])}>{g.label}</button>)}
            </div>
          </div>
          <div style={{ flex: 1, minWidth: 120 }}>
            <label style={s.label}>Number of GPUs</label>
            <input type="number" min={1} max={1024} value={gpus} onChange={e => setGpus(Math.max(1, parseInt(e.target.value) || 1))} style={s.input} />
          </div>
          <div style={{ flex: 1, minWidth: 120 }}>
            <label style={s.label}>Hours</label>
            <input type="number" min={1} value={hours} onChange={e => setHours(Math.max(1, parseInt(e.target.value) || 1))} style={s.input} />
          </div>
        </div>

        {/* Summary cards */}
        <div style={{ display: "flex", gap: 12, marginBottom: 18, flexWrap: "wrap" }}>
          {[
            { label: "GPU · Hours", value: (gpus * hours).toLocaleString() },
            { label: "Best Price", value: cheapest?.vendor ?? "—", sub: cheapest ? `$${fmt(cheapest.total)}` : "" },
            { label: "Most Expensive", value: priciest?.vendor ?? "—", sub: priciest ? `$${fmt(priciest.total)}` : "" },
            { label: "Potential Savings", value: `$${fmt(savings)}`, hi: true },
          ].map(({ label, value, sub, hi }) => (
            <div key={label} style={{ ...s.card, flex: 1, minWidth: 150 }}>
              <div style={{ fontSize: 11, color: "#9ca3af", fontWeight: 700, textTransform: "uppercase", letterSpacing: "0.05em" }}>{label}</div>
              <div style={{ fontSize: 18, fontWeight: 800, color: hi ? "#059669" : "#111827", marginTop: 2 }}>{value}</div>
              {sub && <div style={{ fontSize: 12, color: "#10b981", fontWeight: 700 }}>{sub}</div>}
            </div>
          ))}
        </div>

        {/* Availability legend */}
        <div style={{ display: "flex", gap: 10, marginBottom: 14, flexWrap: "wrap", alignItems: "center" }}>
          <span style={{ fontSize: 11, fontWeight: 700, color: "#9ca3af", textTransform: "uppercase", letterSpacing: "0.05em" }}>Availability:</span>
          {Object.entries(availConfig).map(([k, c]) => (
            <span key={k} style={{ display: "flex", alignItems: "center", gap: 5, fontSize: 12, fontWeight: 600, color: c.color, background: c.bg, padding: "3px 10px", borderRadius: 20 }}>
              <span style={{ width: 7, height: 7, borderRadius: "50%", background: c.dot, display: "inline-block" }} />{c.label}
            </span>
          ))}
        </div>

        {/* Table */}
        <div style={{ borderRadius: 12, overflow: "hidden", border: "1px solid #e5e7eb" }}>
          <table style={{ width: "100%", borderCollapse: "collapse" }}>
            <thead>
              <tr style={{ background: "#111827" }}>
                {["#", "Vendor", "Availability", "$/GPU/Hr", "Total Cost", "Daily Cost"].map((h, i) => (
                  <th key={h} style={{ ...s.th, textAlign: i >= 3 ? "right" : "left" }}>{h}</th>
                ))}
              </tr>
            </thead>
            <tbody>
              {rows.map((v, i) => {
                const isBest = i === 0, cfg = availConfig[v.avail], isHov = tooltip === v.vendor;
                const pct = i > 0 ? ((v.total - rows[0].total) / rows[0].total) * 100 : 0;
                return (
                  <tr key={v.vendor} onMouseEnter={() => setTooltip(v.vendor)} onMouseLeave={() => setTooltip(null)}
                    style={{ background: isHov ? "#f0f9ff" : isBest ? "#f0fdf4" : i % 2 === 0 ? "#fff" : "#f9fafb", cursor: "default" }}>
                    <td style={{ ...s.td, width: 36, fontSize: 13, color: "#9ca3af", fontWeight: 700 }}>{isBest ? "🏆" : i + 1}</td>
                    <td style={s.td}>
                      <div style={{ fontWeight: 700, fontSize: 14, color: "#111827" }}>{v.vendor}</div>
                      {isBest && <span style={{ fontSize: 10, background: "#10b981", color: "white", borderRadius: 4, padding: "2px 7px", fontWeight: 800 }}>BEST PRICE</span>}
                      {isHov && <div style={{ fontSize: 11, color: "#4b5563", marginTop: 3, fontStyle: "italic", maxWidth: 200 }}>{v.availNote}</div>}
                    </td>
                    <td style={s.td}>
                      <span style={{ display: "inline-flex", alignItems: "center", gap: 5, fontSize: 12, fontWeight: 700, color: cfg.color, background: cfg.bg, padding: "4px 10px", borderRadius: 20, whiteSpace: "nowrap" }}>
                        <span style={{ width: 7, height: 7, borderRadius: "50%", background: cfg.dot, flexShrink: 0, display: "inline-block" }} />{cfg.label}
                      </span>
                    </td>
                    <td style={{ ...s.td, textAlign: "right", fontSize: 15, fontWeight: 800, color: "#111827" }}>${v.pricePerHr.toFixed(2)}</td>
                    <td style={{ ...s.td, textAlign: "right" }}>
                      <div style={{ fontSize: 16, fontWeight: 800, color: isBest ? "#059669" : "#111827" }}>${fmt(v.total)}</div>
                      {i > 0 && <div style={{ fontSize: 11, color: "#ef4444", fontWeight: 700 }}>+{pct.toFixed(0)}% vs best</div>}
                    </td>
                    <td style={{ ...s.td, textAlign: "right", fontSize: 14, color: "#6b7280", fontWeight: 600 }}>${fmt(v.pricePerHr * gpus * 24)}</td>
                  </tr>
                );
              })}
            </tbody>
          </table>
        </div>
        <p style={{ fontSize: 11, color: "#9ca3af", marginTop: 10, textAlign: "center" }}>
          Approximate on-demand rates — April 2026. Prices auto-logged weekly on first visit each week.
        </p>
      </>}

      {/* HISTORY TAB */}
      {tab === "history" && <>
        <div style={{ display: "flex", gap: 12, marginBottom: 16, alignItems: "center", flexWrap: "wrap" }}>
          <div style={{ display: "flex", gap: 6 }}>
            {GPU_TYPES.map(g => <button key={g.key} onClick={() => setHistoryGpu(g.key)} style={s.btn(historyGpu === g.key, tierStyle[g.key])}>{g.label}</button>)}
          </div>
          <button onClick={startSnapshot} style={{ marginLeft: "auto", padding: "9px 20px", background: "#111827", color: "white", border: "none", borderRadius: 8, fontWeight: 700, fontSize: 13, cursor: "pointer" }}>
            + Log Manual Snapshot
          </button>
        </div>

        <div style={{ background: "#eff6ff", border: "1px solid #bfdbfe", borderRadius: 10, padding: "10px 16px", marginBottom: 18, fontSize: 13, color: "#1e40af", display: "flex", gap: 8, alignItems: "center" }}>
          <span>🤖</span><span>Prices are <strong>auto-logged every week</strong> on first visit. History is saved to your browser's local storage.</span>
        </div>

        {editSnap === "new" && (
          <div style={{ background: "#f0fdf4", border: "1.5px solid #86efac", borderRadius: 12, padding: 20, marginBottom: 20 }}>
            <div style={{ fontSize: 15, fontWeight: 800, marginBottom: 14, color: "#166534" }}>📋 Manual Snapshot</div>
            <div style={{ marginBottom: 12 }}>
              <label style={s.label}>Label</label>
              <input value={snapLabel} onChange={e => setSnapLabel(e.target.value)}
                style={{ padding: "8px 12px", borderRadius: 8, border: "1.5px solid #d1d5db", fontSize: 14, fontWeight: 600, width: 280, outline: "none" }} />
            </div>
            <div style={{ overflowX: "auto" }}>
              <table style={{ borderCollapse: "collapse", width: "100%", fontSize: 13 }}>
                <thead>
                  <tr style={{ background: "#111827", color: "white" }}>
                    <th style={{ padding: "8px 14px", textAlign: "left", fontWeight: 700 }}>Vendor</th>
                    {GPU_TYPES.map(g => <th key={g.key} style={{ padding: "8px 14px", textAlign: "center", fontWeight: 700 }}>{g.label} ($/hr)</th>)}
                  </tr>
                </thead>
                <tbody>
                  {CURRENT.map((v, ri) => (
                    <tr key={v.vendor} style={{ background: ri % 2 === 0 ? "white" : "#f9fafb", borderBottom: "1px solid #e5e7eb" }}>
                      <td style={{ padding: "8px 14px", fontWeight: 700 }}>{v.vendor}</td>
                      {GPU_TYPES.map(g => (
                        <td key={g.key} style={{ padding: "6px 14px", textAlign: "center" }}>
                          <input type="number" step="0.01" min="0" placeholder="n/a"
                            value={editData[v.vendor]?.[g.key] ?? ""}
                            onChange={e => { const val = e.target.value === "" ? null : parseFloat(e.target.value); setEditData(prev => ({ ...prev, [v.vendor]: { ...prev[v.vendor], [g.key]: val } })); }}
                            style={{ width: 80, padding: "5px 8px", borderRadius: 6, border: "1.5px solid #d1d5db", fontSize: 13, fontWeight: 600, textAlign: "center", outline: "none" }} />
                        </td>
                      ))}
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
            <div style={{ display: "flex", gap: 8, marginTop: 16 }}>
              <button onClick={saveSnapshot} style={{ padding: "9px 22px", background: "#059669", color: "white", border: "none", borderRadius: 8, fontWeight: 700, fontSize: 13, cursor: "pointer" }}>✓ Save</button>
              <button onClick={() => setEditSnap(null)} style={{ padding: "9px 16px", background: "white", color: "#374151", border: "1.5px solid #d1d5db", borderRadius: 8, fontWeight: 700, fontSize: 13, cursor: "pointer" }}>Cancel</button>
            </div>
          </div>
        )}

        {snapshots.length === 0 ? (
          <div style={{ textAlign: "center", padding: 60, color: "#9ca3af", background: "#f9fafb", borderRadius: 12, border: "1.5px dashed #d1d5db" }}>
            <div style={{ fontSize: 36, marginBottom: 12 }}>📊</div>
            <div style={{ fontSize: 16, fontWeight: 700, color: "#374151", marginBottom: 6 }}>No history yet</div>
            <div style={{ fontSize: 13 }}>Prices will auto-log on first visit each week.</div>
          </div>
        ) : <>
          {/* Trend table */}
          <div style={{ borderRadius: 12, overflow: "hidden", border: "1px solid #e5e7eb", marginBottom: 20, overflowX: "auto" }}>
            <table style={{ width: "100%", borderCollapse: "collapse", minWidth: 500 }}>
              <thead>
                <tr style={{ background: "#111827", color: "white" }}>
                  <th style={{ ...s.th, textAlign: "left", whiteSpace: "nowrap" }}>VENDOR</th>
                  {snapshots.map(snap => (
                    <th key={snap.id} style={{ ...s.th, textAlign: "center", whiteSpace: "nowrap" }}>
                      <div>{weekLabel(snap.date)}</div>
                      {snap.auto && <div style={{ fontSize: 9, color: "#86efac" }}>AUTO</div>}
                    </th>
                  ))}
                  {snapshots.length >= 2 && <th style={{ ...s.th, textAlign: "center" }}>CHANGE</th>}
                </tr>
              </thead>
              <tbody>
                {allVendors.map((vendor, vi) => {
                  const prices = snapshots.map(snap => snap.prices[vendor]?.[historyGpu] ?? null);
                  const valid = prices.filter(p => p !== null);
                  const change = valid.length >= 2 ? ((valid[valid.length-1] - valid[0]) / valid[0] * 100) : null;
                  return (
                    <tr key={vendor} style={{ background: vi % 2 === 0 ? "#fff" : "#f9fafb", borderBottom: "1px solid #e5e7eb" }}>
                      <td style={{ ...s.td, fontWeight: 700, fontSize: 13, color: "#111827", whiteSpace: "nowrap" }}>{vendor}</td>
                      {prices.map((p, pi) => {
                        const prev = prices[pi - 1];
                        const delta = prev != null && p != null ? p - prev : null;
                        return (
                          <td key={pi} style={{ ...s.td, textAlign: "center" }}>
                            {p != null ? <>
                              <div style={{ fontWeight: 700, fontSize: 14 }}>${p.toFixed(2)}</div>
                              {delta != null && delta !== 0 && <div style={{ fontSize: 11, fontWeight: 700, color: delta < 0 ? "#059669" : "#ef4444" }}>{delta < 0 ? "▼" : "▲"} ${Math.abs(delta).toFixed(2)}</div>}
                              {delta === 0 && <div style={{ fontSize: 10, color: "#9ca3af" }}>—</div>}
                            </> : <span style={{ color: "#d1d5db" }}>—</span>}
                          </td>
                        );
                      })}
                      {snapshots.length >= 2 && (
                        <td style={{ ...s.td, textAlign: "center" }}>
                          {change != null ? (
                            <span style={{ fontWeight: 800, fontSize: 13, color: change < 0 ? "#059669" : "#ef4444", background: change < 0 ? "#dcfce7" : "#fee2e2", padding: "3px 9px", borderRadius: 20 }}>
                              {change < 0 ? "▼" : "▲"} {Math.abs(change).toFixed(1)}%
                            </span>
                          ) : <span style={{ color: "#d1d5db", fontSize: 12 }}>—</span>}
                        </td>
                      )}
                    </tr>
                  );
                })}
              </tbody>
            </table>
          </div>

          {/* Chart */}
          {snapshots.length >= 2 && (() => {
            const W = Math.max(500, snapshots.length * 100 + 120), H = 220, PL = 60, PR = 20, PT = 20, PB = 40;
            const chartW = W - PL - PR, chartH = H - PT - PB;
            const allP = allVendors.flatMap(v => snapshots.map(s => s.prices[v]?.[historyGpu])).filter(p => p != null);
            if (!allP.length) return null;
            const minP = Math.max(0, Math.floor(Math.min(...allP) * 0.85 * 2) / 2);
            const maxP = Math.ceil(Math.max(...allP) * 1.1 * 2) / 2;
            const toX = i => PL + (i / (snapshots.length - 1)) * chartW;
            const toY = p => PT + (1 - (p - minP) / (maxP - minP)) * chartH;
            return (
              <div style={{ ...s.card, marginBottom: 20 }}>
                <div style={{ fontSize: 14, fontWeight: 700, marginBottom: 16 }}>Price Trend — {historyGpu.toUpperCase()} ($/GPU/hr)</div>
                <div style={{ overflowX: "auto" }}>
                  <svg width={W} height={H} style={{ display: "block" }}>
                    {Array.from({ length: 5 }, (_, i) => { const v = minP + (maxP - minP) * (i / 4), y = toY(v); return <g key={i}><line x1={PL} y1={y} x2={W-PR} y2={y} stroke="#f3f4f6" strokeWidth={1} /><text x={PL-6} y={y+4} textAnchor="end" fontSize={10} fill="#9ca3af">${v.toFixed(1)}</text></g>; })}
                    {snapshots.map((snap, i) => <text key={i} x={toX(i)} y={H-8} textAnchor="middle" fontSize={10} fill="#9ca3af">{new Date(snap.date+"T12:00:00").toLocaleDateString("en-US",{month:"short",day:"numeric"})}</text>)}
                    {allVendors.map((vendor, vi) => {
                      const pts = snapshots.map((snap, i) => { const p = snap.prices[vendor]?.[historyGpu] ?? null; return p != null ? [toX(i), toY(p)] : null; }).filter(Boolean);
                      if (!pts.length) return null;
                      const d = pts.map((p, i) => `${i===0?"M":"L"}${p[0]},${p[1]}`).join(" ");
                      return <g key={vendor}>{pts.length>=2 && <path d={d} fill="none" stroke={VENDOR_COLORS[vi%VENDOR_COLORS.length]} strokeWidth={2} strokeLinejoin="round"/>}{pts.map((pt,i)=><circle key={i} cx={pt[0]} cy={pt[1]} r={4} fill={VENDOR_COLORS[vi%VENDOR_COLORS.length]}/>)}</g>;
                    })}
                  </svg>
                </div>
                <div style={{ display: "flex", flexWrap: "wrap", gap: 10, marginTop: 12 }}>
                  {allVendors.map((v, i) => <span key={v} style={{ display: "flex", alignItems: "center", gap: 5, fontSize: 12, color: "#374151" }}><span style={{ width: 14, height: 3, borderRadius: 2, background: VENDOR_COLORS[i%VENDOR_COLORS.length], display: "inline-block" }}/>{v}</span>)}
                </div>
              </div>
            );
          })()}

          {/* Snapshot chips */}
          <div style={{ display: "flex", flexWrap: "wrap", gap: 8 }}>
            {snapshots.map(snap => (
              <div key={snap.id} style={{ display: "flex", alignItems: "center", gap: 6, background: snap.auto ? "#eff6ff" : "#f3f4f6", border: `1px solid ${snap.auto ? "#bfdbfe" : "#e5e7eb"}`, borderRadius: 8, padding: "6px 12px", fontSize: 12, color: "#374151" }}>
                {snap.auto && <span style={{ fontSize: 10, background: "#3b82f6", color: "white", borderRadius: 3, padding: "1px 5px", fontWeight: 700 }}>AUTO</span>}
                <span style={{ fontWeight: 600 }}>{snap.label}</span>
                <button onClick={() => persist(snapshots.filter(s => s.id !== snap.id))} style={{ background: "none", border: "none", color: "#ef4444", cursor: "pointer", fontSize: 14, padding: 0, lineHeight: 1 }}>×</button>
              </div>
            ))}
          </div>
        </>}
      </>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
